version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
    command: mosquitto -c /mosquitto-no-auth.conf

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: natrl_dev
      MYSQL_DATABASE: natrl
      MYSQL_USER: natrl
      MYSQL_PASSWORD: natrl_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/02_ir_codes_data.sql:/docker-entrypoint-initdb.d/02_ir_codes_data.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  waveform-engine:
    build: ./waveform-engine
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: mysql+pymysql://natrl:natrl_dev@mysql:3306/natrl
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      MQTT_URL: mqtt://mosquitto:1883
      REDIS_URL: redis://redis:6379
      WAVEFORM_ENGINE_URL: http://waveform-engine:8001
      DATABASE_URL: mysql+pymysql://natrl:natrl_dev@mysql:3306/natrl
    depends_on:
      - mosquitto
      - redis
      - mysql
      - waveform-engine

volumes:
  mosquitto_data:
  mysql_data:
