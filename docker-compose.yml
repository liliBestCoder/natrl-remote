version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
    command: mosquitto -c /mosquitto-no-auth.conf

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: natrl
      POSTGRES_USER: natrl
      POSTGRES_PASSWORD: natrl_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql

  waveform-engine:
    build: ./waveform-engine
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://natrl:natrl_dev@postgres:5432/natrl
    depends_on:
      - postgres

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      MQTT_URL: mqtt://mosquitto:1883
      REDIS_URL: redis://redis:6379
      WAVEFORM_ENGINE_URL: http://waveform-engine:8001
      DATABASE_URL: postgresql://natrl:natrl_dev@postgres:5432/natrl
    depends_on:
      - mosquitto
      - redis
      - postgres
      - waveform-engine

volumes:
  mosquitto_data:
  pg_data:
